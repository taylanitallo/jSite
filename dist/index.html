
  <!DOCTYPE html>
  <html lang="pt-BR">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>JEOS SISTEMAS</title>
      <!-- [SECURITY] Bloqueia exibição em iframes (Clickjacking) -->
      <meta http-equiv="X-Frame-Options" content="DENY" />
      <!-- [SECURITY] Desativa detecção automática de MIME types -->
      <meta http-equiv="X-Content-Type-Options" content="nosniff" />
      <!-- [SECURITY] Ativa proteção XSS em browsers legados -->
      <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
      <!-- [SECURITY] Controla informações de referrer vazadas -->
      <meta name="referrer" content="strict-origin-when-cross-origin" />
      <!-- [SECURITY] Content Security Policy: bloqueia scripts externos não autorizados -->
      <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self'; frame-ancestors 'none';" />
      <!-- [SECURITY] Força HTTPS em browsers compatíveis -->
      <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains" />
      <script type="module" crossorigin src="/assets/DsRgMC6Z.js"></script>
      <link rel="stylesheet" crossorigin href="/assets/NxYbQQqc.css">
    </head>

    <body>
      <div id="root"></div>
    </body>
  </html>
